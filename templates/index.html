<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淨水地圖 - 靜宜大學專案</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #map { height: 450px; width: 100%; border-radius: 8px; }
        .input-group { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        #statusLabel { font-size: 0.9em; color: #e67e22; margin: 10px 0; }
        /* 新增：讓內容可以並排顯示 */
.main-content {
    display: flex;
    gap: 20px;
    height: 500px; /* 固定高度 */
}

#map { 
    flex: 2; /* 地圖佔比較大 */
    height: 100%; 
    border-radius: 8px; 
}

.list-container {
    flex: 1; /* 列表佔比較小 */
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow-y: auto; /* 超出高度時可滾動 */
}

.fountain-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.3s;
}

.fountain-item:hover {
    background: #f9f9f9;
}

.fountain-item h4 { margin: 0 0 5px 0; color: #2c3e50; }
.fountain-item p { margin: 0; font-size: 0.85em; color: #7f8c8d; }

/* 手機版適應：改為上下排列 */
@media (max-width: 600px) {
    .main-content { flex-direction: column; height: auto; }
    #map { height: 300px; }
}
/* 新增：回首頁按鈕樣式 */
.btn-home {
    background: #95a5a6; /* 灰色調，與功能按鈕區隔 */
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 6px;
    font-size: 0.9em;
    font-weight: bold;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.btn-home:hover {
    background: #7f8c8d;
    transform: translateY(-2px);
}

/* 標題區域佈局優化 */
.header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
}
    </style>
</head>
<body>
<div class="card">
    <div class="header-row">
        <h1>💧 淨水地圖 (Water Refresh Map)</h1>
        <a href="/" class="btn-home">🏠 回到專案首頁</a>
    </div>
    <p class="team-info">團隊：重生之要當富豪榜前4 | 響應 SDG 6</p>
        
        <!-- 在輸入組中新增選單 -->
<div class="input-group">
    <!-- 大樓選擇：加入 onchange 事件 -->
    <select id="building" onchange="updateFloors()" style="padding: 10px; flex: 1; border: 1px solid #ddd; border-radius: 4px;">
    <option value="">請選擇大樓</option>
    <option value="主顧樓">主顧樓</option>
    <option value="格致樓">格致樓</option>
    <option value="任垣樓">任垣樓</option>
    <option value="伯鐸樓">伯鐸樓</option>
    <option value="方濟樓">方濟樓</option>
    <option value="西嘉學苑">西嘉學苑</option>
</select>

    <!-- 樓層選擇：初始為空 -->
    <select id="floor" style="padding: 10px; width: 100px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="">樓層</option>
    </select>

    <input type="date" id="filterDate">

    <select id="machineStatus" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="正常">✅ 正常</option>
        <option value="故障">❌ 故障</option>
        <option value="維修中">🛠️ 維修中</option>
    </select>
</div>
        <div class="input-group">
            <button class="btn-blue" onclick="getLocation()">📌 獲取目前定位</button>
            <button class="btn-green" onclick="submitLocation()">✅ 上傳至資料庫</button>
        </div>
        <p id="statusLabel">請點擊按鈕獲取位置資訊...</p>
    </div>

    <div class="main-content">
    <!-- 左側/上方地圖 -->
    <div id="map"></div>
    
    <!-- 右側/下方列表 -->
    <div class="list-container">
        <h3>📍 飲水機清單</h3>
        <div id="fountainList">載入中...</div>
    </div>
</div>
</div>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQrkk87bD2qt2zJtxLDd2oirD2JfFtRjs&callback=initMap"></script>

<script>
    let map;
    let currentUserCoords = null;
    const puCenter = { lat: 24.2268, lng: 120.5772 }; // 靜宜大學中心點 [cite: 14]

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 17,
            center: puCenter,
        });
        loadMarkers();
    }

    // 修改後的 loadMarkers 函式
function loadMarkers() {
    const listElement = document.getElementById("fountainList");
    
    fetch('/get_fountains')
        .then(res => res.json())
        .then(data => {
            listElement.innerHTML = ""; // 清空載入中文字
            
            data.forEach(item => {
                // 1. 建立地圖標記 (原本的程式碼)
                const marker = new google.maps.Marker({
                    position: { lat: item.lat, lng: item.lng },
                    map: map,
                    title: item.location_name
                });
                
                const info = new google.maps.InfoWindow({
                    content: `<b>${item.location_name}</b><br>濾心更新：${item.last_filter_change}<br>狀態：${item.status}`
                });
                
                marker.addListener("click", () => info.open(map, marker));

                // 2. 建立右側列表項目 (新功能)
                const div = document.createElement('div');
                div.className = 'fountain-item';
                div.innerHTML = `
                    <h4>${item.location_name}</h4>
                    <p>📅 濾心更新：${item.last_filter_change}</p>
                    <p>🔧 狀態：${item.status}</p>
                `;
                
                // 點擊清單項目時，地圖跳轉到該位置並開啟視窗
                div.onclick = () => {
                    map.panTo({ lat: item.lat, lng: item.lng });
                    map.setZoom(19);
                    info.open(map, marker);
                };
                
                listElement.appendChild(div);
            });
            
            if(data.length === 0) {
                listElement.innerHTML = "<p>目前暫無資料</p>";
            }
        });
}

    // 強化版的定位函式
// 強化版的定位函式
function getLocation() {
    const label = document.getElementById("statusLabel");
    label.innerText = "📍 正在喚醒 GPS 裝置，請稍候...";

    // 檢查瀏覽器是否支援定位
    if (!navigator.geolocation) {
        label.innerText = "❌ 您的瀏覽器不支援定位功能。";
        return;
    }

    // 設定定位參數 (Options)
    // 在你的 getLocation 函式中修改 options
const options = {
    enableHighAccuracy: false, // 改為 false，讓它先用 Wi-Fi 或基地台快速定位，不要硬抓 GPS
    timeout: 5000,
    maximumAge: 30000          // 允許使用 30 秒內的舊位置資料
};

    navigator.geolocation.getCurrentPosition(
        (position) => {
            // 成功獲取座標 [cite: 25]
            currentUserCoords = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };
            
            label.style.color = "#27ae60"; // 成功時顯示綠色
            label.innerText = `✅ 定位成功：${currentUserCoords.lat.toFixed(5)}, ${currentUserCoords.lng.toFixed(5)}`;
            
            // 地圖中心跳轉並放置「你」的標記
            map.setCenter(currentUserCoords);
            map.setZoom(18); // 縮放級別拉近
            
            new google.maps.Marker({
                position: currentUserCoords,
                map: map,
                label: "你",
                icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png' // 藍色小圓點標記自己
            });
        },
        (error) => {
            // 針對失敗原因進行詳細偵錯
            label.style.color = "#e74c3c"; // 失敗時顯示紅色
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    label.innerText = "❌ 定位失敗：請在網址列左側開啟「位置資訊」存取權限。";
                    break;
                case error.POSITION_UNAVAILABLE:
                    label.innerText = "❌ 定位失敗：無法偵測到位置，請確認是否開啟手機/電腦的 GPS 開關。";
                    break;
                case error.TIMEOUT:
                    label.innerText = "❌ 定位失敗：連線逾時，請重試一次。";
                    break;
                default:
                    label.innerText = "❌ 定位失敗：發生未知錯誤。";
            }
        },
        options
    );
}

    function submitLocation() {
    const name = document.getElementById("locName").value;
    const date = document.getElementById("filterDate").value;
    
    if (!name || !currentUserCoords) {
        return alert("請先完成定位並填寫名稱！");
    }

    const payload = { 
        name, 
        date, 
        lat: currentUserCoords.lat, 
        lng: currentUserCoords.lng 
    };

    fetch('/add_fountain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        
        // --- 核心改動：立即在畫面上新增標記 ---
        const newMarker = new google.maps.Marker({
            position: { lat: payload.lat, lng: payload.lng },
            map: map,
            title: payload.name,
            animation: google.maps.Animation.DROP // 增加掉落動畫增加視覺回饋
        });

        const info = new google.maps.InfoWindow({
            content: `<b>${payload.name}</b><br>濾心更新：${payload.date}<br>狀態：正常`
        });

        newMarker.addListener("click", () => info.open(map, newMarker));
        
        // 清空輸入框
        document.getElementById("locName").value = "";
        document.getElementById("filterDate").value = "";
    })
    .catch(err => {
        console.error("Error:", err);
        alert("上傳失敗，請檢查網路連線。");
    });
}

function updateFloors() {
        const building = document.getElementById("building").value;
        const floorSelect = document.getElementById("floor");
        floorSelect.innerHTML = "";

        const floorConfig = {
            "主顧樓": 7,
            "格致樓": 7,
            "任垣樓": 6,
            "伯鐸樓": 4,
            "方濟樓": 4,
            "西嘉學苑": 5
        };

        const maxFloor = floorConfig[building] || 0;

        for (let i = 1; i <= maxFloor; i++) {
            const opt = document.createElement("option");
            opt.value = i + "F";
            opt.textContent = i + "F";
            floorSelect.appendChild(opt);
        }
        
        if (maxFloor === 0) {
            const opt = document.createElement("option");
            opt.textContent = "樓層";
            floorSelect.appendChild(opt);
        }
    }
</script>
</body>
</html>
